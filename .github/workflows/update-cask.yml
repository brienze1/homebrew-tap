name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA256="${{ github.event.client_payload.sha256 }}"

          sed -i "s|url \".*\"|url \"https://github.com/brienze1/quant/archive/refs/tags/${VERSION}.tar.gz\"|" Formula/quant.rb
          sed -i "s|sha256.*|sha256 \"${SHA256}\"|" Formula/quant.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/quant.rb
          git commit -m "Update quant to ${{ github.event.client_payload.version }}"
          git push
