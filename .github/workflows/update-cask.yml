name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Cask formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA_ARM64="${{ github.event.client_payload.sha256_arm64 }}"
          SHA_AMD64="${{ github.event.client_payload.sha256_amd64 }}"

          sed -i "s|version \".*\"|version \"${VERSION}\"|" Casks/quant.rb

          # Update arm64 sha (first occurrence)
          sed -i "0,/sha256 \".*\"/{s|sha256 \".*\"|sha256 \"${SHA_ARM64}\"|}" Casks/quant.rb

          # Update amd64 sha (second occurrence)
          sed -i "0,/sha256 \"${SHA_ARM64}\"/! {0,/sha256 \".*\"/ s|sha256 \".*\"|sha256 \"${SHA_AMD64}\"|}" Casks/quant.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/quant.rb
          git commit -m "Update quant to ${{ github.event.client_payload.version }}"
          git push
